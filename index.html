<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6-Letter Word Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Word Game</h1>
      <label class="word-length-label">
        Word length:
        <select id="wordLength" aria-label="Number of letters in the word">
          <option value="4">4 letters</option>
          <option value="5">5 letters</option>
          <option value="6" selected>6 letters</option>
        </select>
      </label>
      <button type="button" class="start-game" id="startGame">Start Game</button>
    </header>

    <main>
      <div class="game-board" id="gameBoard" aria-label="Game board"></div>
      <div class="message" id="message" aria-live="polite"></div>
      <button type="button" class="play-again hidden" id="playAgain">Play Again</button>
    </main>

    <aside class="stats" id="stats">
      <div class="stat"><span class="stat-value" id="gamesPlayed">0</span> Games</div>
      <div class="stat"><span class="stat-value" id="wins">0</span> Wins</div>
      <div class="stat"><span class="stat-value" id="winStreak">0</span> Streak</div>
    </aside>

    <section class="keyboard" id="keyboard" aria-label="On-screen keyboard"></section>
  </div>
  <div class="watermark" aria-hidden="true">migsbismark20260308</div>
  <script src="app.js"></script>
</body>
</html>
